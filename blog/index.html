<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Blog — Guides & Insights for Construction Document Processing | Type It</title>
    <meta name="description" content="Learn how AI-powered document processing helps Australian construction professionals save hours on drawing schedules, certificates, and compliance paperwork.">
    <link rel="canonical" href="https://www.typeit.com/blog">

    <!-- Open Graph Tags -->
    <meta property="og:title" content="Construction Document Processing Blog | Type It">
    <meta property="og:description" content="Guides and insights on AI-powered document processing for construction professionals.">
    <meta property="og:image" content="https://www.typeit.com/typeit-logo.png">
    <meta property="og:url" content="https://www.typeit.com/blog">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700;800&family=Poppins:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: #fff;
        }

        header {
            height: 56px;
            background: rgba(250, 250, 250, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
            padding-top: 6px;
        }

        .nav-logo img {
            height: 48px;
            width: auto;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 28px;
        }

        .nav-links a {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #42526e;
            text-decoration: none;
            transition: color 0.15s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #3b82f6;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .nav-actions .download-btn {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            color: #fff;
            background: #3b82f6;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            transition: all 0.15s;
        }

        .nav-actions .download-btn:hover {
            background: #2563eb;
        }

        /* Blog Hero */
        .blog-hero {
            padding: 140px 80px 80px;
            text-align: center;
            background: #f5f5f0;
            overflow: visible;
        }

        .blog-hero h1 {
            font-family: 'Bricolage Grotesque', sans-serif;
            font-size: 120px;
            font-weight: 800;
            color: #1a1a2e;
            margin-bottom: 0;
            line-height: 1.2;
            letter-spacing: -2px;
        }

        .blog-hero p {
            max-width: 640px;
            margin: 20px auto 0;
            font-family: 'Inter', sans-serif;
            font-size: 1.05rem;
            color: #64748b;
            line-height: 1.7;
        }

        /* Category Filters */
        .blog-filters {
            padding: 40px 80px 0;
            max-width: 1200px;
            margin: 0 auto;
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 24px;
        }

        .category-btn {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #333;
            background: #fff;
            border: 2px solid #e5e5e5;
            border-radius: 8px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-btn:hover {
            border-color: #3b82f6;
        }

        .category-btn.active {
            border-color: #3b82f6;
            background: #fff;
        }

        .category-btn .count {
            font-weight: 400;
            color: #999;
            font-size: 12px;
        }

        .article-count {
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #666;
            padding: 16px 0 40px;
        }

        .article-count span {
            color: #3b82f6;
            font-weight: 600;
        }

        /* Blog Grid */
        .blog-grid {
            max-width: 1500px;
            margin: 0 auto;
            padding: 0 60px 60px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 36px;
        }

        .blog-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            background: #fff;
        }

        .blog-card:hover {
            transform: translateY(-4px);
        }

        .blog-card-image {
            width: 100%;
            height: 260px;
            background: #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 14px;
            border-radius: 16px;
            overflow: hidden;
        }

        .blog-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .blog-card-body {
            padding: 22px 2px 8px;
        }

        .blog-card-category {
            font-family: 'Inter', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #3b82f6;
            margin-bottom: 10px;
        }

        .blog-card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 24px;
            font-weight: 400;
            color: #0f0f0f;
            margin-bottom: 12px;
            line-height: 1.25;
        }

        .blog-card-excerpt {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            color: #7a7a7a;
            line-height: 1.65;
            font-weight: 400;
        }

        .blog-card-meta {
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            color: #999;
            display: none;
        }

        /* Footer */
        .site-footer {
            padding: 30px 80px;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top: 1px solid #e5e7eb;
            margin-top: 60px;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-logo img {
            height: 32px;
            width: auto;
        }

        .footer-nav {
            display: flex;
            gap: 24px;
        }

        .footer-nav a {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #64748b;
            text-decoration: none;
        }

        .footer-nav a:hover {
            color: #3b82f6;
        }

        .footer-copyright {
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            color: #64748b;
            text-align: center;
            line-height: 1.5;
        }

        /* Hamburger menu */
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }

        .hamburger svg {
            width: 24px;
            height: 24px;
            color: #42526e;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .hamburger {
                display: block;
            }
            .blog-hero {
                padding: 100px 20px 32px;
            }
            .blog-hero h1 {
                font-size: 40px;
            }
            .blog-filters {
                padding: 32px 20px 0;
            }
            .category-buttons {
                gap: 8px;
            }
            .category-btn {
                padding: 10px 16px;
                font-size: 12px;
            }
            .blog-grid {
                grid-template-columns: 1fr;
                padding: 0 20px 40px;
            }
            .site-footer {
                padding: 24px 20px;
                flex-direction: column;
                gap: 16px;
                text-align: center;
            }
            .footer-nav {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .blog-hero {
                padding: 80px 16px 24px;
            }
            .blog-hero h1 {
                font-size: 32px;
            }
            .blog-filters {
                padding: 24px 16px 0;
            }
            .category-btn {
                padding: 8px 12px;
                font-size: 11px;
            }
            .blog-grid {
                padding: 0 16px 32px;
            }
            .site-footer {
                padding: 20px 16px;
            }
        }
    </style>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "Construction Document Processing Blog — Guides & Insights",
      "description": "Guides and insights on AI-powered document processing for Australian construction professionals.",
      "url": "https://www.typeit.com/blog",
      "publisher": {
        "@type": "Organization",
        "name": "Type It",
        "url": "https://www.typeit.com",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.typeit.com/typeit-logo.png"
        }
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://www.typeit.com/"
        },
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Blog",
          "item": "https://www.typeit.com/blog"
        }
      ]
    }
    </script>
</head>
<body>
    <header>
        <a href="/" class="nav-logo">
            <img src="/typeit-logo.png" alt="Type It">
        </a>
        <nav class="nav-links">
            <a href="/typeit-pricing.html">Pricing</a>
            <a href="/blog/index.html" class="active">Blog</a>
        </nav>
        <div class="nav-actions">
            <a href="/contact" class="download-btn">Contact Us</a>
        </div>
        <button class="hamburger" aria-label="Menu" onclick="document.querySelector('.nav-links').classList.toggle('show')">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </button>
    </header>

    <!-- Blog Hero -->
    <section class="blog-hero">
        <h1>Blog</h1>
        <p>Explore guides and insights on AI-powered document processing for Australian construction professionals. From drawing schedules to certificate generation &mdash; learn how to save hours on every job.</p>
    </section>

    <!-- Category Filters -->
    <div class="blog-filters">
        <div class="category-buttons">
            <button class="category-btn active" data-category="all">ALL <span class="count"></span></button>
            <button class="category-btn" data-category="knowledge">KNOWLEDGE <span class="count"></span></button>
            <button class="category-btn" data-category="how-to">HOW-TO <span class="count"></span></button>
            <button class="category-btn" data-category="company-update">COMPANY UPDATE <span class="count"></span></button>
        </div>
        <p class="article-count"><span></span> articles</p>
    </div>

    <!-- Blog Grid -->
    <div class="blog-grid" id="blog-grid">
        <!-- Blog posts loaded dynamically from posts.json -->
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-logo">
            <img src="/typeit-logo.png" alt="Type It">
        </div>
        <nav class="footer-nav">
            <a href="/typeit-pricing.html">Pricing</a>
            <a href="/blog/index.html">Blog</a>
            <a href="/contact">Contact</a>
        </nav>
        <div class="footer-copyright">
            &copy; <script>document.write(new Date().getFullYear())</script> Type It. All rights reserved.
        </div>
    </footer>

    <script>
        async function loadBlogPosts() {
            try {
                const response = await fetch('/blog/posts.json');
                const posts = await response.json();

                const blogGrid = document.getElementById('blog-grid');
                const publishedPosts = posts.filter(post => post.published);

                publishedPosts.forEach(post => {
                    const card = createBlogCard(post);
                    blogGrid.appendChild(card);
                });

                initializeFilters();
            } catch (error) {
                console.error('Error loading blog posts:', error);
            }
        }

        function createBlogCard(post) {
            const card = document.createElement('a');
            card.href = `/blog/${post.slug}`;
            card.className = 'blog-card';
            card.dataset.category = post.category;
            card.style.cssText = 'text-decoration:none;color:inherit;';

            const formattedDate = new Date(post.date).toLocaleDateString('en-US', {
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });

            card.innerHTML = `
                <div class="blog-card-image">
                    <img src="${post.image}" alt="${post.title}">
                </div>
                <div class="blog-card-body">
                    <p class="blog-card-category">${post.categoryLabel}</p>
                    <h3 class="blog-card-title">${post.title}</h3>
                    <p class="blog-card-excerpt">${post.excerpt}</p>
                    <p class="blog-card-meta">${post.author} &middot; ${formattedDate}</p>
                </div>
            `;

            return card;
        }

        function initializeFilters() {
            const categoryBtns = document.querySelectorAll('.category-btn');
            const articleCountEl = document.querySelector('.article-count span');

            function updateCategoryCounts() {
                const blogCards = document.querySelectorAll('.blog-card');
                categoryBtns.forEach(btn => {
                    const cat = btn.dataset.category;
                    const count = cat === 'all'
                        ? blogCards.length
                        : document.querySelectorAll(`.blog-card[data-category="${cat}"]`).length;
                    btn.querySelector('.count').textContent = `(${count})`;
                });
                articleCountEl.textContent = blogCards.length;
            }
            updateCategoryCounts();

            categoryBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    categoryBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const category = btn.dataset.category;
                    let visibleCount = 0;
                    const blogCards = document.querySelectorAll('.blog-card');

                    blogCards.forEach(card => {
                        if (category === 'all' || card.dataset.category === category) {
                            card.style.display = '';
                            visibleCount++;
                        } else {
                            card.style.display = 'none';
                        }
                    });

                    articleCountEl.textContent = visibleCount;
                });
            });
        }

        loadBlogPosts();
    </script>
</body>
</html>
