<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Your Information - Entry</title>
    <link rel="icon" type="image/png" href="notextlogo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: #f8fafc;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            animation: fadeIn 0.18s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            z-index: -1;
            pointer-events: none;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 0 100%);
        }

        .gradient-bg canvas {
            width: 100% !important;
            height: 100% !important;
        }

        .gradient-container {
            width: 100%;
            height: 100%;
        }

        .header {
            background: transparent;
            padding: 24px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-img {
            height: 40px;
            width: auto;
        }

        .header-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
        }

        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 32px 24px 100px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 15px;
            color: #64748b;
        }

        .section {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid #e2e8f0;
            cursor: pointer;
            user-select: none;
        }

        .section-header:hover {
            background: #f8fafc;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }

        .section-title svg {
            width: 20px;
            height: 20px;
            color: #2563eb;
        }

        .section-toggle {
            width: 24px;
            height: 24px;
            color: #94a3b8;
            transition: transform 0.2s;
        }

        .section.collapsed .section-toggle {
            transform: rotate(-90deg);
        }

        .section-content {
            padding: 24px;
            display: grid;
            gap: 20px;
        }

        .section.collapsed .section-content {
            display: none;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-row.single {
            grid-template-columns: 1fr;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 500;
            color: #475569;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            height: 42px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 0 12px;
            font-size: 14px;
            font-family: inherit;
            color: #1e293b;
            background: #fff;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-textarea {
            height: auto;
            min-height: 80px;
            padding: 12px;
            resize: vertical;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-input::placeholder {
            color: #94a3b8;
        }

        /* Services list */
        .services-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .service-item {
            padding: 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .service-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .service-name {
            font-weight: 600;
            color: #1e293b;
        }

        .service-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 4px;
        }

        .service-delete:hover {
            color: #dc2626;
        }

        .service-fields {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        /* Trading hours */
        .hours-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .hours-row {
            display: grid;
            grid-template-columns: 100px 1fr 1fr 80px;
            gap: 12px;
            align-items: center;
        }

        .hours-day {
            font-weight: 500;
            color: #475569;
            font-size: 14px;
        }

        .hours-closed {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: #64748b;
        }

        .hours-closed input {
            width: 16px;
            height: 16px;
        }

        /* FAQs */
        .faq-item {
            padding: 16px;
            background: #f8fafc;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .faq-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .faq-question {
            flex: 1;
        }

        .faq-delete {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            padding: 4px;
            flex-shrink: 0;
        }

        /* Add button */
        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: white;
            border: 2px dashed #e2e8f0;
            border-radius: 8px;
            color: #64748b;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .add-btn:hover {
            border-color: #2563eb;
            color: #2563eb;
        }

        .add-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Bottom bar */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            color: #475569;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .back-btn:hover {
            background: #f8fafc;
        }

        .submit-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 32px;
            background: #2563eb;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
        }

        .submit-btn:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .submit-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }

        .submit-btn svg {
            width: 18px;
            height: 18px;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #e2e8f0;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 16px;
            font-size: 14px;
            color: #64748b;
        }

        /* Error banner */
        .error-banner {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .error-banner.hidden {
            display: none;
        }

        .error-banner svg {
            width: 20px;
            height: 20px;
            color: #ef4444;
            flex-shrink: 0;
            margin-top: 1px;
        }

        .error-content {
            flex: 1;
        }

        .error-title {
            font-weight: 600;
            color: #991b1b;
            margin-bottom: 4px;
        }

        .error-message {
            font-size: 14px;
            color: #b91c1c;
        }

        .error-link {
            color: #2563eb;
            text-decoration: underline;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .service-fields {
                grid-template-columns: 1fr;
            }

            .hours-row {
                grid-template-columns: 80px 1fr 1fr;
            }

            .hours-row .hours-closed {
                grid-column: span 3;
            }

            .main-content {
                padding: 20px 16px 100px;
            }
        }
    </style>
</head>
<body>
    <div id="gradient-root" class="gradient-bg"></div>
    <script type="module" src="/src/main.jsx"></script>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">Creating your account...</div>
    </div>

    <header class="header">
        <img src="entry-white-text.png" alt="Entry" class="logo-img">
        <span class="header-title">Review & Submit</span>
    </header>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Review Your Information</h1>
            <p class="page-subtitle">We've extracted details from your website. Review and edit anything that needs updating.</p>
        </div>

        <div class="error-banner hidden" id="errorBanner">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
            </svg>
            <div class="error-content">
                <div class="error-title" id="errorTitle">Error</div>
                <div class="error-message" id="errorMessage"></div>
            </div>
        </div>

        <!-- Business Info Section -->
        <section class="section" id="businessSection">
            <div class="section-header" onclick="toggleSection('businessSection')">
                <div class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z" />
                    </svg>
                    Business Information
                </div>
                <svg class="section-toggle" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                </svg>
            </div>
            <div class="section-content">
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Business Name</label>
                        <input type="text" class="form-input" id="companyName" placeholder="Your Business Name">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="mainCategory">
                            <option value="Trades & Services">Trades & Services</option>
                            <option value="Healthcare">Healthcare</option>
                            <option value="Automotive Repair & Maintenance">Automotive</option>
                            <option value="Veterinary">Veterinary</option>
                            <option value="Beauty & Personal Care">Beauty & Personal Care</option>
                            <option value="Professional Services">Professional Services</option>
                            <option value="Home Services">Home Services</option>
                            <option value="Retail & E-commerce">Retail</option>
                            <option value="Food & Beverage">Food & Beverage</option>
                            <option value="Education & Training">Education & Training</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="form-row single">
                    <div class="form-group">
                        <label class="form-label">Business Description</label>
                        <textarea class="form-textarea" id="businessDescription" placeholder="Brief description of your business"></textarea>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-input" id="businessPhone" placeholder="+61 400 000 000">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="publicEmail" placeholder="contact@business.com">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Website</label>
                        <input type="url" class="form-input" id="website" placeholder="https://www.business.com">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Address</label>
                        <input type="text" class="form-input" id="fixedAddress" placeholder="123 Main St, Sydney NSW 2000">
                    </div>
                </div>
            </div>
        </section>

        <!-- Services Section -->
        <section class="section" id="servicesSection">
            <div class="section-header" onclick="toggleSection('servicesSection')">
                <div class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456Z" />
                    </svg>
                    Services (<span id="servicesCount">0</span>)
                </div>
                <svg class="section-toggle" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                </svg>
            </div>
            <div class="section-content">
                <div class="services-list" id="servicesList"></div>
                <button class="add-btn" onclick="addService()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    Add Service
                </button>
            </div>
        </section>

        <!-- Trading Hours Section -->
        <section class="section" id="hoursSection">
            <div class="section-header" onclick="toggleSection('hoursSection')">
                <div class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                    Trading Hours
                </div>
                <svg class="section-toggle" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                </svg>
            </div>
            <div class="section-content">
                <div class="form-group" style="margin-bottom: 16px;">
                    <label class="form-label">Timezone</label>
                    <select class="form-select" id="timezone">
                        <option value="Australia/Sydney">Australia/Sydney (AEST/AEDT)</option>
                        <option value="Australia/Melbourne">Australia/Melbourne (AEST/AEDT)</option>
                        <option value="Australia/Brisbane">Australia/Brisbane (AEST)</option>
                        <option value="Australia/Perth">Australia/Perth (AWST)</option>
                        <option value="Australia/Adelaide">Australia/Adelaide (ACST/ACDT)</option>
                        <option value="Australia/Darwin">Australia/Darwin (ACST)</option>
                        <option value="Australia/Hobart">Australia/Hobart (AEST/AEDT)</option>
                    </select>
                </div>
                <div class="hours-grid" id="hoursGrid"></div>
            </div>
        </section>

        <!-- FAQs Section -->
        <section class="section collapsed" id="faqsSection">
            <div class="section-header" onclick="toggleSection('faqsSection')">
                <div class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 5.25h.008v.008H12v-.008Z" />
                    </svg>
                    FAQs (<span id="faqsCount">0</span>)
                </div>
                <svg class="section-toggle" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                </svg>
            </div>
            <div class="section-content">
                <div class="services-list" id="faqsList"></div>
                <button class="add-btn" onclick="addFAQ()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    Add FAQ
                </button>
            </div>
        </section>

        <!-- Policies Section -->
        <section class="section collapsed" id="policiesSection">
            <div class="section-header" onclick="toggleSection('policiesSection')">
                <div class="section-title">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                    </svg>
                    Policies (<span id="policiesCount">0</span>)
                </div>
                <svg class="section-toggle" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
                </svg>
            </div>
            <div class="section-content">
                <div class="services-list" id="policiesList"></div>
                <button class="add-btn" onclick="addPolicy()">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    Add Policy
                </button>
            </div>
        </section>
    </main>

    <div class="bottom-bar">
        <button class="back-btn" onclick="window.location.href='/contact'">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
            </svg>
            Back
        </button>
        <button class="submit-btn" id="submitBtn" onclick="submitData()">
            Create Account
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5 21 12m0 0-7.5 7.5M21 12H3" />
            </svg>
        </button>
    </div>

    <script>
        // Store data globally
        let businessData = null;
        let userData = null;

        const days = ['monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday', 'sunday'];
        const dayLabels = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

        // Toggle section collapse
        function toggleSection(sectionId) {
            document.getElementById(sectionId).classList.toggle('collapsed');
        }

        // Load data from sessionStorage
        function loadData() {
            const extractedDataStr = sessionStorage.getItem('extracted_data');
            const userDataStr = sessionStorage.getItem('user_data');

            if (!extractedDataStr || !userDataStr) {
                window.location.href = '/onboarding';
                return;
            }

            businessData = JSON.parse(extractedDataStr);
            userData = JSON.parse(userDataStr);

            // Populate form fields
            document.getElementById('companyName').value = businessData.company_name || '';
            document.getElementById('mainCategory').value = businessData.main_category || 'Other';
            document.getElementById('businessDescription').value = businessData.business_description || '';
            document.getElementById('businessPhone').value = businessData.business_phone || '';
            document.getElementById('publicEmail').value = businessData.public_email || '';
            document.getElementById('website').value = businessData.website || '';
            document.getElementById('fixedAddress').value = businessData.fixed_address || '';
            document.getElementById('timezone').value = businessData.trading_hours?.timezone || 'Australia/Sydney';

            // Render services
            renderServices();

            // Render trading hours
            renderTradingHours();

            // Render FAQs
            renderFAQs();

            // Render policies
            renderPolicies();
        }

        // Render services list
        function renderServices() {
            const container = document.getElementById('servicesList');
            const services = businessData.services || [];

            container.innerHTML = services.map((service, index) => `
                <div class="service-item" data-index="${index}">
                    <div class="service-header">
                        <input type="text" class="form-input service-name-input" value="${escapeHtml(service.service_name)}" placeholder="Service name" style="font-weight: 600; border: none; padding: 0; height: auto; background: transparent;">
                        <button class="service-delete" onclick="deleteService(${index})">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="18" height="18">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                            </svg>
                        </button>
                    </div>
                    <div class="service-fields">
                        <div class="form-group">
                            <label class="form-label">Duration (mins)</label>
                            <input type="number" class="form-input service-duration" value="${service.estimated_duration_minutes || ''}" placeholder="60">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Price ($)</label>
                            <input type="number" class="form-input service-price" value="${service.price_amount || ''}" placeholder="0.00" step="0.01">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Pricing Model</label>
                            <select class="form-select service-pricing-model">
                                <option value="Fixed Price" ${service.pricing_model === 'Fixed Price' ? 'selected' : ''}>Fixed Price</option>
                                <option value="Hourly" ${service.pricing_model === 'Hourly' ? 'selected' : ''}>Hourly</option>
                                <option value="Quote" ${service.pricing_model === 'Quote' ? 'selected' : ''}>Quote</option>
                                <option value="Free" ${service.pricing_model === 'Free' ? 'selected' : ''}>Free</option>
                                <option value="Variable" ${service.pricing_model === 'Variable' ? 'selected' : ''}>Variable</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group" style="margin-top: 12px;">
                        <label class="form-label">Description</label>
                        <textarea class="form-textarea service-description" placeholder="Service description" style="min-height: 60px;">${escapeHtml(service.description || '')}</textarea>
                    </div>
                </div>
            `).join('');

            document.getElementById('servicesCount').textContent = services.length;
        }

        // Render trading hours
        function renderTradingHours() {
            const container = document.getElementById('hoursGrid');
            const hours = businessData.trading_hours || {};

            container.innerHTML = days.map((day, index) => {
                const dayHours = hours[day] || { open: null, close: null, is_closed: true };
                return `
                    <div class="hours-row" data-day="${day}">
                        <span class="hours-day">${dayLabels[index]}</span>
                        <input type="time" class="form-input hours-open" value="${dayHours.open || '09:00'}" ${dayHours.is_closed ? 'disabled' : ''}>
                        <input type="time" class="form-input hours-close" value="${dayHours.close || '17:00'}" ${dayHours.is_closed ? 'disabled' : ''}>
                        <label class="hours-closed">
                            <input type="checkbox" ${dayHours.is_closed ? 'checked' : ''} onchange="toggleDayClosed('${day}', this.checked)">
                            Closed
                        </label>
                    </div>
                `;
            }).join('');
        }

        function toggleDayClosed(day, isClosed) {
            const row = document.querySelector(`.hours-row[data-day="${day}"]`);
            const openInput = row.querySelector('.hours-open');
            const closeInput = row.querySelector('.hours-close');
            openInput.disabled = isClosed;
            closeInput.disabled = isClosed;
        }

        // Render FAQs
        function renderFAQs() {
            const container = document.getElementById('faqsList');
            const faqs = businessData.faqs || [];

            container.innerHTML = faqs.map((faq, index) => `
                <div class="faq-item" data-index="${index}">
                    <div class="faq-header">
                        <div class="faq-question form-group" style="flex: 1;">
                            <label class="form-label">Question</label>
                            <input type="text" class="form-input faq-question-input" value="${escapeHtml(faq.question)}" placeholder="Question">
                        </div>
                        <button class="faq-delete" onclick="deleteFAQ(${index})">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="18" height="18">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                            </svg>
                        </button>
                    </div>
                    <div class="form-group" style="margin-top: 12px;">
                        <label class="form-label">Answer</label>
                        <textarea class="form-textarea faq-answer-input" placeholder="Answer">${escapeHtml(faq.answer)}</textarea>
                    </div>
                </div>
            `).join('');

            document.getElementById('faqsCount').textContent = faqs.length;
        }

        // Render policies
        function renderPolicies() {
            const container = document.getElementById('policiesList');
            const policies = businessData.policies || [];

            container.innerHTML = policies.map((policy, index) => `
                <div class="faq-item" data-index="${index}">
                    <div class="faq-header">
                        <div class="faq-question form-group" style="flex: 1;">
                            <label class="form-label">Policy Title</label>
                            <input type="text" class="form-input policy-title-input" value="${escapeHtml(policy.title)}" placeholder="Policy title">
                        </div>
                        <button class="faq-delete" onclick="deletePolicy(${index})">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="18" height="18">
                                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                            </svg>
                        </button>
                    </div>
                    <div class="form-group" style="margin-top: 12px;">
                        <label class="form-label">Content</label>
                        <textarea class="form-textarea policy-content-input" placeholder="Policy content">${escapeHtml(policy.content)}</textarea>
                    </div>
                </div>
            `).join('');

            document.getElementById('policiesCount').textContent = policies.length;
        }

        // Add/delete functions
        function addService() {
            businessData.services = businessData.services || [];
            businessData.services.push({
                service_name: '',
                description: null,
                estimated_duration_minutes: 60,
                buffer_before: null,
                buffer_after: null,
                price_amount: null,
                price_min: null,
                price_max: null,
                pricing_model: 'Fixed Price',
                requires_booking: true,
                available_online: true,
                is_quote_service: false
            });
            renderServices();
        }

        function deleteService(index) {
            businessData.services.splice(index, 1);
            renderServices();
        }

        function addFAQ() {
            businessData.faqs = businessData.faqs || [];
            businessData.faqs.push({ question: '', answer: '', category: null, keywords: null });
            renderFAQs();
            // Expand FAQs section
            document.getElementById('faqsSection').classList.remove('collapsed');
        }

        function deleteFAQ(index) {
            businessData.faqs.splice(index, 1);
            renderFAQs();
        }

        function addPolicy() {
            businessData.policies = businessData.policies || [];
            businessData.policies.push({ title: '', content: '' });
            renderPolicies();
            // Expand policies section
            document.getElementById('policiesSection').classList.remove('collapsed');
        }

        function deletePolicy(index) {
            businessData.policies.splice(index, 1);
            renderPolicies();
        }

        // Collect all form data
        function collectFormData() {
            // Update basic info
            businessData.company_name = document.getElementById('companyName').value.trim();
            businessData.main_category = document.getElementById('mainCategory').value;
            businessData.business_description = document.getElementById('businessDescription').value.trim() || null;
            businessData.business_phone = document.getElementById('businessPhone').value.trim() || null;
            businessData.public_email = document.getElementById('publicEmail').value.trim() || null;
            businessData.website = document.getElementById('website').value.trim() || null;
            businessData.fixed_address = document.getElementById('fixedAddress').value.trim() || null;

            // Update trading hours
            businessData.trading_hours = businessData.trading_hours || {};
            businessData.trading_hours.timezone = document.getElementById('timezone').value;

            days.forEach(day => {
                const row = document.querySelector(`.hours-row[data-day="${day}"]`);
                const isClosed = row.querySelector('input[type="checkbox"]').checked;
                const open = row.querySelector('.hours-open').value;
                const close = row.querySelector('.hours-close').value;

                businessData.trading_hours[day] = {
                    open: isClosed ? null : open,
                    close: isClosed ? null : close,
                    is_closed: isClosed
                };
            });

            // Update services
            const serviceItems = document.querySelectorAll('.service-item');
            businessData.services = Array.from(serviceItems).map(item => ({
                service_name: item.querySelector('.service-name-input').value.trim(),
                description: item.querySelector('.service-description').value.trim() || null,
                estimated_duration_minutes: parseInt(item.querySelector('.service-duration').value) || null,
                buffer_before: null,
                buffer_after: null,
                price_amount: parseFloat(item.querySelector('.service-price').value) || null,
                price_min: null,
                price_max: null,
                pricing_model: item.querySelector('.service-pricing-model').value,
                requires_booking: true,
                available_online: true,
                is_quote_service: item.querySelector('.service-pricing-model').value === 'Quote'
            })).filter(s => s.service_name);

            // Update FAQs
            const faqItems = document.querySelectorAll('#faqsList .faq-item');
            businessData.faqs = Array.from(faqItems).map(item => ({
                question: item.querySelector('.faq-question-input').value.trim(),
                answer: item.querySelector('.faq-answer-input').value.trim(),
                category: null,
                keywords: null
            })).filter(f => f.question && f.answer);

            // Update policies
            const policyItems = document.querySelectorAll('#policiesList .faq-item');
            businessData.policies = Array.from(policyItems).map(item => ({
                title: item.querySelector('.policy-title-input').value.trim(),
                content: item.querySelector('.policy-content-input').value.trim()
            })).filter(p => p.title && p.content);

            return businessData;
        }

        // Show error
        function showError(title, message, showSignIn = false) {
            const banner = document.getElementById('errorBanner');
            document.getElementById('errorTitle').textContent = title;

            if (showSignIn) {
                document.getElementById('errorMessage').innerHTML = message + ' <a class="error-link" href="https://app.askentry.com">Sign in instead</a>';
            } else {
                document.getElementById('errorMessage').textContent = message;
            }

            banner.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function hideError() {
            document.getElementById('errorBanner').classList.add('hidden');
        }

        // Submit data
        async function submitData() {
            hideError();

            const data = collectFormData();

            // Validate required fields
            if (!data.company_name) {
                showError('Missing Information', 'Please enter your business name.');
                return;
            }

            // Show loading
            document.getElementById('loadingOverlay').classList.remove('hidden');
            document.getElementById('submitBtn').disabled = true;

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user: userData,
                        businessData: data
                    })
                });

                const result = await response.json();

                if (result.success) {
                    // Clear session storage
                    sessionStorage.removeItem('onboarding_url');
                    sessionStorage.removeItem('extracted_data');
                    sessionStorage.removeItem('user_data');

                    // Redirect to the app
                    window.location.href = result.redirectUrl || 'https://app.askentry.com';
                } else {
                    document.getElementById('loadingOverlay').classList.add('hidden');
                    document.getElementById('submitBtn').disabled = false;

                    if (result.errorCode === 'USER_EXISTS') {
                        showError('Account Exists', result.error, true);
                    } else {
                        showError('Error', result.error || 'Something went wrong. Please try again.');
                    }
                }
            } catch (error) {
                console.error('Submit error:', error);
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('submitBtn').disabled = false;
                showError('Network Error', 'Please check your connection and try again.');
            }
        }

        // Escape HTML
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        loadData();
    </script>
</body>
</html>
