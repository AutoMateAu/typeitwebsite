<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources - VoiceAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            transition: opacity 0.2s ease-out;
        }

        body.fade-out {
            opacity: 0;
        }

        header {
            height: 48px;
            background: rgba(250, 250, 250, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 0.02em;
            text-decoration: none;
        }

        .nav-logo svg {
            width: 20px;
            height: 20px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-links a {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #334155;
            text-decoration: none;
            transition: color 0.15s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #0f172a;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-actions .sign-in {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #334155;
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            transition: all 0.15s;
        }

        .nav-actions .sign-in:hover {
            color: #0f172a;
            border-color: #cbd5e1;
        }

        .nav-actions .download-btn {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            background: #1e293b;
            padding: 6px 18px;
            border-radius: 20px;
            text-decoration: none;
            transition: background 0.15s;
        }

        .nav-actions .download-btn:hover {
            background: #334155;
        }

        .hero {
            min-height: 100vh;
            margin-top: 48px;
            background: linear-gradient(135deg, #faf5ff 0%, #f3e8ff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
        }

        .hero h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 56px;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .hero p {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            color: #64748b;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="nav-logo">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            VOICEAI
        </a>
        <nav class="nav-links">
            <a href="features.html">Platform</a>
            <a href="enterprise.html">Enterprise</a>
            <a href="pricing.html">Pricing</a>
            <a href="resources.html" class="active">Resources</a>
        </nav>
        <div class="nav-actions">
            <a href="#" class="sign-in">Sign in</a>
            <a href="onboarding.html" class="download-btn">Download</a>
        </div>
    </header>
    <main class="hero">
        <div class="hero-content">
            <h1>Resources</h1>
            <p>Guides, tutorials, and documentation to help you get the most out of VoiceAI.</p>
        </div>
    </main>
    <script>
        // Page transition for download button
        document.querySelectorAll('a[href="onboarding.html"]').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = 'onboarding.html';
                }, 200);
            });
        });
    </script>
</body>
</html>
