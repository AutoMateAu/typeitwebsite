<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise - Entry</title>
    <link rel="icon" type="image/png" href="notextlogo.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            transition: opacity 0.2s ease-out;
        }

        body.fade-out {
            opacity: 0;
        }

        header {
            height: 48px;
            background: rgba(250, 250, 250, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .nav-logo img {
            height: 28px;
            width: auto;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .nav-links a {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #334155;
            text-decoration: none;
            transition: color 0.15s;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #0f172a;
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-actions .sign-in {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #334155;
            text-decoration: none;
            padding: 6px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            transition: all 0.15s;
        }

        .nav-actions .sign-in:hover {
            color: #0f172a;
            border-color: #cbd5e1;
        }

        .nav-actions .download-btn {
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 500;
            color: #fff;
            background: #1e293b;
            padding: 6px 18px;
            border-radius: 20px;
            text-decoration: none;
            transition: background 0.15s;
        }

        .nav-actions .download-btn:hover {
            background: #334155;
        }

        .hero {
            min-height: 100vh;
            margin-top: 48px;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px;
        }

        .hero-content {
            text-align: center;
            max-width: 800px;
        }

        .hero h1 {
            font-family: 'Poppins', sans-serif;
            font-size: 56px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 24px;
            letter-spacing: -0.03em;
            line-height: 1.1;
        }

        .hero p {
            font-family: 'Inter', sans-serif;
            font-size: 20px;
            color: #94a3b8;
            line-height: 1.6;
        }
        /* Hamburger menu */
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }
        .hamburger svg {
            width: 24px;
            height: 24px;
            color: #334155;
        }

        @media (max-width: 768px) {
            .nav-links, .nav-actions .sign-in {
                display: none;
            }
            .hamburger {
                display: block;
            }
            .hero {
                padding: 40px 20px;
            }
            .hero h1 {
                font-size: 32px;
            }
            .hero p {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .hero {
                padding: 32px 16px;
            }
            .hero h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="/" class="nav-logo">
            <img src="entry-final-clean.png" alt="Entry">
        </a>
        <nav class="nav-links">
            <a href="/features">Platform</a>
            <a href="/enterprise" class="active">Enterprise</a>
            <a href="/pricing">Pricing</a>
        </nav>
        <div class="nav-actions">
            <a href="https://app.askentry.com" class="sign-in">Sign in</a>
            <a href="/onboarding" class="download-btn">Sign Up</a>
        </div>
        <button class="hamburger" aria-label="Menu">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
            </svg>
        </button>
    </header>
    <main class="hero">
        <div class="hero-content">
            <h1>Enterprise</h1>
            <p>Scale your business with enterprise-grade AI voice agents, custom integrations, and dedicated support.</p>
        </div>
    </main>
    <script>
        // Page transition for download button
        document.querySelectorAll('a[href="/onboarding"]').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                document.body.classList.add('fade-out');
                setTimeout(() => {
                    window.location.href = '/onboarding';
                }, 200);
            });
        });
    </script>
</body>
</html>
